version: "3.9"

services:
  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sportsmind_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./backend/qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportsmind_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/data:/app/data
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: sportsmind_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
